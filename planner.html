            <div class="planner-box">
                <form id="todoForm" class="todo-input-row">
                    <input type="text" id="todoInput" placeholder="Add cybersecurity assignment..." required>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Add Task</button>
                </form>
                <div class="task-status-bar">
                    <span>Active Milestones: <strong id="taskCount">0</strong></span>
                </div>
                <ul id="todoList" class="todo-list"></ul>
            </div>
        </section>
